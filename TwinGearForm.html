<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TWINGEAR MOTO</title>
<style>
/* GENERAL STYLES */
body {
    font-family: 'Roboto', Arial, sans-serif;
    background-color: #121212;
    margin: 0;
    padding: 0;
    color: #FFD700;
}

.container {
    max-width: 800px;
    margin: 20px auto;
    background-color: #1e1e1e;
    border-radius: 10px;
    padding: 30px;
    box-shadow: 0 0 15px #FFD700;
}

h1 {
    text-align: center;
    font-weight: 500;
    margin-bottom: 30px;
}

.section {
    display: none;
}

.section.active {
    display: block;
}

h2 {
    font-size: 1.2em;
    font-weight: 500;
    margin-bottom: 15px;
    border-bottom: 1px solid #FFD700;
    padding-bottom: 5px;
}

label {
    display: block;
    margin-top: 15px;
    font-weight: 500;
}

input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border: 1px solid #FFD700;
    border-radius: 5px;
    background-color: #2a2a2a;
    color: #FFD700;
    font-size: 1em;
    box-sizing: border-box;
}

input:disabled {
    background-color: #444;
    color: #ccc;
}

textarea {
    resize: vertical;
    min-height: 80px;
}

button {
    background-color: #FFD700;
    color: #121212;
    border: none;
    padding: 12px 25px;
    border-radius: 5px;
    font-size: 1em;
    cursor: pointer;
    margin-top: 20px;
}

button:hover {
    background-color: #e6c200;
}

.hidden {
    display: none;
}

small {
    color: #ccc;
    font-size: 0.85em;
}

.error {
    border: 2px solid red;
}

.nav-buttons {
    display: flex;
    justify-content: space-between;
    margin-top: 20px;
}

/* RESPONSIVE STYLES FOR MOBILE */
@media screen and (max-width: 600px) {
    .container {
        padding: 20px;
        margin: 10px;
    }
    button {
        width: 48%;
        padding: 10px;
    }
    .nav-buttons {
        flex-direction: column;
        gap: 10px;
    }
    .nav-buttons button {
        width: 100%;
    }
    h1 {
        font-size: 1.5em;
    }
    h2 {
        font-size: 1.1em;
    }
    input, select, textarea {
        font-size: 0.95em;
        padding: 8px;
    }
}
</style>
</head>
<body>

<div class="container">
<h1>TWINGEAR MOTO APPLICATION FORM</h1>

<form id="applicationForm">

<!-- SECTION 1: Personal Information -->
<div class="section active">
<h2>APPLICANT PERSONAL INFORMATION</h2>
<label>First Name:</label>
<input type="text" placeholder="Enter First Name" required>
<label>Last Name:</label>
<input type="text" placeholder="Enter Last Name" required>
<label>Middle Name:</label>
<input type="text" placeholder="Enter Middle Name" required>
<label>Civil Status:</label>
<select id="civilStatus" required>
<option value="">Select Civil Status</option>
<option>Single</option>
<option>Single with Live-in Partner</option>
<option>Married</option>
<option>Widow/Widower</option>
</select>
<label>Gender:</label>
<select required>
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>
<label>Birthday:</label>
<input type="date" id="birthday" required>
<label>Age:</label>
<input type="text" id="age" placeholder="Auto-calculated" readonly>
<label>Place of Birth:</label>
<input type="text" placeholder="Enter Place of Birth" required>
<label>Contact Number:</label>
<input type="text" placeholder="09#########" pattern="09[0-9]{9}" required>
<label>Email:</label>
<input type="email" placeholder="Enter Email" required>
<div class="nav-buttons">
<button type="button" class="next">Next</button>
</div>
</div>

<!-- The remaining sections (Residential, Income, Spouse, Character Reference, Motorcycle, Supporting Documents) will remain the same as the previous code but inherit responsive styles from above -->

</form>
</div>

<script>
// MULTI-STEP NAVIGATION
let currentStep = 0;
const sections = document.querySelectorAll(".section");
function showStep(n){ sections.forEach((s,i)=>s.classList.toggle("active", i===n)); }
document.querySelectorAll(".next").forEach(btn=>{
btn.addEventListener("click", ()=>{
if(validateStep(sections[currentStep])){
currentStep++;
if(currentStep===3){
let civ=document.getElementById("civilStatus").value;
if(civ==="Married"||civ==="Single with Live-in Partner"){ sections[currentStep].classList.add("active"); } else{ currentStep++; showStep(currentStep); return; }
}
showStep(currentStep);
}})});
document.querySelectorAll(".prev").forEach(btn=>{
btn.addEventListener("click", ()=>{
currentStep--;
showStep(currentStep);
})});

// VALIDATION PER STEP
function validateStep(section){
let valid = true;
section.querySelectorAll("[required]").forEach(f=>{
if(!f.value){ f.classList.add("error"); valid=false; }else{ f.classList.remove("error"); }
});
if(!valid) alert("THESE INFORMATION CANNOT BE BLANKED");
return valid;
}

// AGE AUTO-CALCULATION
document.getElementById("birthday").addEventListener("change", function(){
let birth = new Date(this.value);
let today = new Date();
let age = today.getFullYear() - birth.getFullYear();
let m = today.getMonth() - birth.getMonth();
if(m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
document.getElementById("age").value = age;
});

// SHOW RESIDENTIAL INFO
document.getElementById("resStatus").addEventListener("change", function(){
let sec = document.getElementById("resSection");
if(this.value){ sec.classList.remove("hidden"); } else { sec.classList.add("hidden"); }

if(this.value === "Owned"){
for(let i=1;i<=5;i++){
document.getElementById("pres"+i).value=document.getElementById("perm"+i).value;
document.getElementById("pres"+i).disabled=true;
}
document.getElementById("rent").value=0;
document.getElementById("rent").disabled=true;
}else{
for(let i=1;i<=5;i++){ document.getElementById("pres"+i).disabled=false; }
document.getElementById("rent").disabled=false;
}
});

// AUTO COPY PERMANENT ADDRESS
for(let i=1;i<=5;i++){
document.getElementById("perm"+i).addEventListener("input", function(){
if(document.getElementById("resStatus").value==="Owned"){
document.getElementById("pres"+i).value=this.value;
}
});
}

// SHOW OTHER SOURCE FIELD
document.getElementById("source").addEventListener("change", function(){
document.getElementById("otherSource").classList.toggle("hidden", this.value!=="other");
});

// FINAL FORM SUBMIT VALIDATION
document.getElementById("applicationForm").addEventListener("submit", function(e){
let ok = true;
document.querySelectorAll("[required]").forEach(function(f){
if(!f.value){ f.classList.add("error"); ok=false; } else { f.classList.remove("error"); }
});
if(!ok){ alert("THESE INFORMATION CANNOT BE BLANKED"); e.preventDefault(); }
});
</script>

</body>
</html>
